name: PR Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for iCloud sync conflicts
        run: |
          if find . \
            -path ./node_modules -prune -o \
            -path ./.git -prune -o \
            -path ./static/stockfish -prune -o \
            -name "* [0-9]*" -print | grep -q .; then
            echo "::error::iCloud sync conflicts detected"
            find . \
              -path ./node_modules -prune -o \
              -path ./.git -prune -o \
              -path ./static/stockfish -prune -o \
              -name "* [0-9]*" -print
            exit 1
          fi

  node-quality:
    name: Node Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run check

      - name: Unit tests with coverage
        run: pnpm vitest run --coverage

      - name: Build
        run: pnpm run build

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectKey: Jonathangadeaharder_Chess
          organization: jonathangadeaharder

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  required-checks:
    name: Required Checks (PR)
    runs-on: ubuntu-latest
    needs:
      - repo-hygiene
      - node-quality
      - sonarcloud
      - dependency-scan
      - secret-scanning
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.repo-hygiene.result }}" != "success" ] || \
             [ "${{ needs.node-quality.result }}" != "success" ] || \
             [ "${{ needs.sonarcloud.result }}" != "success" ] || \
             [ "${{ needs.dependency-scan.result }}" != "success" ] || \
             [ "${{ needs.secret-scanning.result }}" != "success" ]; then
            echo "::error::One or more PR gate jobs failed."
            echo "repo-hygiene: ${{ needs.repo-hygiene.result }}"
            echo "node-quality: ${{ needs.node-quality.result }}"
            echo "sonarcloud: ${{ needs.sonarcloud.result }}"
            echo "dependency-scan: ${{ needs.dependency-scan.result }}"
            echo "secret-scanning: ${{ needs.secret-scanning.result }}"
            exit 1
          fi
          echo "All PR gate jobs passed."
