services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${PORT:-8080}:80'
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-mini}
      - LOCAL_AI_BASE_URL=http://ollama-shared:11434
      - MINI_MODEL=${MINI_MODEL:-phi3:mini}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma2:2b}
    restart: unless-stopped
    networks:
      - coolify

networks:
  coolify:
    external: true
